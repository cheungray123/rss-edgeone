<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSS EdgeOne</title>
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-tertiary: #1a1a1a;
      --bg-card: #222222;
      --bg-hover: #2a2a2a;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #d97706;
      --accent-hover: #f59e0b;
      --accent-muted: rgba(217, 119, 6, 0.15);
      --danger: #ef4444;
      --danger-hover: #f87171;
      --success: #22c55e;
      --border: #2e2e2e;
      --shadow: 0 4px 20px rgba(0,0,0,0.5);
      --radius: 12px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header-title span { color: var(--accent); }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }
    .login-btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .login-btn:hover { background: var(--accent-hover); }
    .login-btn.logged-in {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .api-key-input {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      width: 200px;
      outline: none;
      transition: border 0.2s;
    }
    .api-key-input:focus { border-color: var(--accent); }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-tertiary);
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .status-dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); }

    /* Main */
    .main {
      padding: 24px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* Login Required Overlay */
    .login-required {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
    }
    .login-required-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.3;
    }
    .login-required h2 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .login-required p {
      color: var(--text-secondary);
      margin-bottom: 24px;
    }
    .login-required .login-btn {
      font-size: 1rem;
      padding: 12px 32px;
    }

    /* Add Feed Form */
    .add-feed-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }
    .add-feed-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .add-feed-form {
      display: flex;
      gap: 12px;
    }
    .add-feed-form input {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s;
    }
    .add-feed-form input:focus { border-color: var(--accent); }
    .add-feed-form input::placeholder { color: var(--text-muted); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-outline {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { background: var(--bg-hover); color: var(--text-primary); }
    .btn-danger { background: transparent; color: var(--danger); padding: 4px 8px; }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar .spacer { flex: 1; }

    /* Feeds Section */
    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .feeds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }
    .feed-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .feed-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .feed-card.active { border-color: var(--accent); background: var(--accent-muted); }
    .feed-card-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .feed-card-url {
      font-size: 0.75rem;
      color: var(--text-muted);
      word-break: break-all;
      margin-bottom: 8px;
    }
    .feed-card-time { font-size: 0.72rem; color: var(--text-muted); }
    .feed-card-delete {
      opacity: 0;
      transition: opacity 0.2s;
    }
    .feed-card:hover .feed-card-delete { opacity: 1; }

    /* Articles Grid */
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .article-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
    }
    .article-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .article-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .article-title a {
      color: var(--text-primary);
      text-decoration: none;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .article-title a:hover { color: var(--accent); }
    .article-meta {
      display: flex;
      gap: 12px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .article-meta .feed-tag {
      background: var(--accent-muted);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
    }

    /* Settings */
    .settings-panel {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .settings-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      font-size: 0.85rem;
      color: var(--text-secondary);
      padding: 8px 0;
    }
    .settings-toggle:hover { color: var(--text-primary); }
    .settings-toggle .arrow { transition: transform 0.2s; font-size: 0.7rem; }
    .settings-toggle.open .arrow { transform: rotate(180deg); }
    .settings-body { display: none; margin-top: 16px; }
    .settings-body.open { display: block; }
    .settings-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .settings-row label { font-size: 0.85rem; color: var(--text-secondary); min-width: 80px; }
    .settings-row input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: var(--bg-tertiary);
      border-radius: 2px;
    }
    .settings-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }

    /* Health Bar */
    .health-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 24px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--text-muted);
      display: flex;
      gap: 20px;
      z-index: 50;
    }
    .health-bar .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .health-bar .dot.ok { background: var(--success); }
    .health-bar .dot.err { background: var(--danger); }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 80px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      box-shadow: var(--shadow);
      animation: toast-in 0.3s ease;
    }
    .toast.error { border-left: 3px solid var(--danger); }
    .toast.success { border-left: 3px solid var(--success); }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-hover) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
      height: 16px;
    }
    .skeleton.w80 { width: 80%; }
    .skeleton.w60 { width: 60%; }
    .skeleton.h20 { height: 20px; }

    /* Empty */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }

    /* Footer spacer */
    .footer-spacer { height: 50px; }

    /* Responsive */
    @media (max-width: 768px) {
      .header { padding: 12px 16px; flex-wrap: wrap; }
      .header-actions { margin-left: 0; width: 100%; margin-top: 12px; }
      .api-key-input { width: 100%; }
      .add-feed-form { flex-direction: column; }
      .feeds-grid { grid-template-columns: 1fr; }
      .articles-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-title"><span>RSS</span> EdgeOne</div>
    <div class="header-actions">
      <span class="status-badge">
        <span class="status-dot" id="sse-dot"></span>
        <span id="sse-label">未连接</span>
      </span>
      <input type="password" class="api-key-input" id="api-key-input" placeholder="输入 API Key 登录" />
      <button class="login-btn" id="login-btn">登录</button>
    </div>
  </header>

  <main class="main">
    <!-- Login Required View -->
    <div id="login-view" class="login-required">
      <div class="login-required-icon">🔐</div>
      <h2>需要登录</h2>
      <p>请输入 API Key 登录后查看和管理您的订阅源</p>
      <button class="login-btn" id="login-btn-main">立即登录</button>
    </div>

    <!-- Main Content (hidden until login) -->
    <div id="main-content" style="display: none;">
      <!-- Add Feed -->
      <div class="add-feed-section">
        <div class="add-feed-title">添加订阅源</div>
        <div class="add-feed-form">
          <input type="url" id="feed-url-input" placeholder="RSS 源 URL" />
          <input type="text" id="feed-title-input" placeholder="标题（可选）" />
          <button class="btn btn-primary" id="add-feed-btn">添加</button>
        </div>
      </div>

      <!-- Feeds Grid -->
      <div class="section-title">我的订阅源</div>
      <div class="feeds-grid" id="feeds-list">
        <div class="skeleton w80 h20"></div>
        <div class="skeleton w60 h20"></div>
      </div>

      <!-- Articles -->
      <div class="toolbar">
        <span class="section-title" style="margin:0;">文章列表</span>
        <button class="btn btn-outline btn-sm" id="refresh-btn">刷新</button>
        <button class="btn btn-outline btn-sm" id="trigger-check-btn">触发抓取</button>
        <button class="btn btn-outline btn-sm" id="clear-filter-btn" style="display:none;">清除筛选</button>
        <div class="spacer"></div>
        <span id="articles-count" style="font-size: 0.8rem; color: var(--text-muted);"></span>
      </div>
      <div class="articles-grid" id="articles-list">
        <div class="skeleton w80 h20"></div>
        <div class="skeleton w60 h20"></div>
        <div class="skeleton w80 h20"></div>
      </div>

      <!-- Settings -->
      <div class="settings-panel">
        <div class="settings-toggle" id="settings-toggle">
          <span>⚙ 设置</span>
          <span class="arrow">▼</span>
        </div>
        <div class="settings-body" id="settings-body">
          <div class="settings-row">
            <label>时间范围</label>
            <input type="range" id="time-range-slider" min="1" max="168" value="24" />
            <span id="time-range-value">24 小时</span>
          </div>
          <button class="btn btn-primary btn-sm" id="save-settings-btn">保存设置</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="health-bar" id="health-bar">
    <span><span class="dot ok"></span>服务正常</span>
  </footer>

  <div class="toast-container" id="toast-container"></div>

  <div class="footer-spacer"></div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  // ==================== DOM ====================
  var apiKeyInput = document.getElementById('api-key-input');
  var loginBtn = document.getElementById('login-btn');
  var loginBtnMain = document.getElementById('login-btn-main');
  var loginView = document.getElementById('login-view');
  var mainContent = document.getElementById('main-content');
  var sseDot = document.getElementById('sse-dot');
  var sseLabel = document.getElementById('sse-label');
  var feedUrlInput = document.getElementById('feed-url-input');
  var feedTitleInput = document.getElementById('feed-title-input');
  var addFeedBtn = document.getElementById('add-feed-btn');
  var feedsList = document.getElementById('feeds-list');
  var articlesList = document.getElementById('articles-list');
  var articlesCount = document.getElementById('articles-count');
  var refreshBtn = document.getElementById('refresh-btn');
  var triggerCheckBtn = document.getElementById('trigger-check-btn');
  var clearFilterBtn = document.getElementById('clear-filter-btn');
  var settingsToggle = document.getElementById('settings-toggle');
  var settingsBody = document.getElementById('settings-body');
  var timeRangeSlider = document.getElementById('time-range-slider');
  var timeRangeValue = document.getElementById('time-range-value');
  var saveSettingsBtn = document.getElementById('save-settings-btn');
  var healthBar = document.getElementById('health-bar');
  var toastContainer = document.getElementById('toast-container');

  // ==================== State ====================
  var isLoggedIn = false;
  var feeds = [];
  var articles = [];
  var activeFeedId = null;
  var eventSource = null;

  // ==================== Helpers ====================
  function getApiKey() {
    return localStorage.getItem('rss_api_key') || '';
  }

  function authHeaders() {
    var key = getApiKey();
    var h = { 'Content-Type': 'application/json' };
    if (key) h['X-API-Key'] = key;
    return h;
  }

  function showToast(msg, type) {
    type = type || 'info';
    var el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    toastContainer.appendChild(el);
    setTimeout(function () {
      el.style.opacity = '0';
      el.style.transition = 'opacity 0.3s';
      setTimeout(function () { el.remove(); }, 300);
    }, 3000);
  }

  function formatDate(iso) {
    try {
      var d = new Date(iso);
      return d.toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch (e) { return iso; }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escapeAttr(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function apiFetch(url, options) {
    options = options || {};
    var headers = Object.assign({}, authHeaders(), options.headers || {});
    try {
      var res = await fetch(url, { method: options.method || 'GET', headers: headers, body: options.body });
      if (res.status === 401 || res.status === 403) {
        if (isLoggedIn) {
          showToast('认证失败，请重新登录', 'error');
          logout();
        }
        return null;
      }
      return res;
    } catch (e) {
      showToast('网络错误：' + e.message, 'error');
      return null;
    }
  }

  // ==================== Auth ====================
  function checkLogin() {
    var key = getApiKey();
    if (key) {
      isLoggedIn = true;
      loginView.style.display = 'none';
      mainContent.style.display = 'block';
      loginBtn.textContent = '退出';
      loginBtn.classList.add('logged-in');
      apiKeyInput.value = key;
      loadData();
      connectSSE();
    } else {
      isLoggedIn = false;
      loginView.style.display = 'flex';
      mainContent.style.display = 'none';
      loginBtn.textContent = '登录';
      loginBtn.classList.remove('logged-in');
    }
  }

  function login() {
    var key = apiKeyInput.value.trim();
    if (!key) { showToast('请输入 API Key', 'error'); return; }
    localStorage.setItem('rss_api_key', key);
    checkLogin();
    showToast('登录成功', 'success');
  }

  function logout() {
    localStorage.removeItem('rss_api_key');
    apiKeyInput.value = '';
    if (eventSource) { eventSource.close(); eventSource = null; }
    checkLogin();
  }

  loginBtn.addEventListener('click', function () {
    if (isLoggedIn) {
      logout();
    } else {
      login();
    }
  });

  loginBtnMain.addEventListener('click', login);

  apiKeyInput.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') login();
  });

  // ==================== Load Data ====================
  function loadData() {
    loadFeeds();
    loadArticles();
    loadSettings();
  }

  // ==================== Feeds ====================
  async function loadFeeds() {
    feedsList.innerHTML = '<div class="skeleton w80 h20"></div><div class="skeleton w60 h20"></div>';
    var res = await apiFetch('/api/feeds');
    if (!res) { feedsList.innerHTML = '<div class="empty-state">加载失败</div>'; return; }
    feeds = await res.json();
    renderFeeds();
  }

  function renderFeeds() {
    if (feeds.length === 0) {
      feedsList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📡</div>暂无订阅源<br><small>添加一个开始吧</small></div>';
      return;
    }
    feedsList.innerHTML = '';
    feeds.forEach(function (feed) {
      var card = document.createElement('div');
      card.className = 'feed-card' + (activeFeedId === feed.id ? ' active' : '');
      card.innerHTML =
        '<div class="feed-card-title">' +
          '<span>' + escapeHtml(feed.title || feed.url) + '</span>' +
          '<button class="btn btn-danger feed-card-delete" data-delete-feed="' + feed.id + '">删除</button>' +
        '</div>' +
        '<div class="feed-card-url">' + escapeHtml(feed.url) + '</div>' +
        '<div class="feed-card-time">' + formatDate(feed.createdAt) + '</div>';
      card.addEventListener('click', function (e) {
        if (e.target.closest('[data-delete-feed]')) return;
        if (activeFeedId === feed.id) {
          activeFeedId = null;
          clearFilterBtn.style.display = 'none';
        } else {
          activeFeedId = feed.id;
          clearFilterBtn.style.display = '';
        }
        renderFeeds();
        renderArticles();
      });
      feedsList.appendChild(card);
    });

    feedsList.querySelectorAll('[data-delete-feed]').forEach(function (btn) {
      btn.addEventListener('click', async function (e) {
        e.stopPropagation();
        if (!confirm('确定删除此订阅源？')) return;
        var id = btn.getAttribute('data-delete-feed');
        var res = await apiFetch('/api/feeds/' + id, { method: 'DELETE' });
        if (!res) return;
        if (res.ok) {
          showToast('订阅源已删除', 'success');
          if (activeFeedId === id) activeFeedId = null;
          loadFeeds();
        } else {
          var data = await res.json();
          showToast(data.error || '删除失败', 'error');
        }
      });
    });
  }

  addFeedBtn.addEventListener('click', async function () {
    var url = feedUrlInput.value.trim();
    var title = feedTitleInput.value.trim();
    if (!url) { showToast('请输入 RSS 源 URL', 'error'); feedUrlInput.focus(); return; }
    addFeedBtn.disabled = true;
    addFeedBtn.textContent = '添加中…';
    var res = await apiFetch('/api/feeds', {
      method: 'POST',
      body: JSON.stringify({ url: url, title: title })
    });
    addFeedBtn.disabled = false;
    addFeedBtn.textContent = '添加';
    if (!res) return;
    if (res.ok) {
      showToast('订阅源已添加', 'success');
      feedUrlInput.value = '';
      feedTitleInput.value = '';
      loadFeeds();
    } else {
      var data = await res.json();
      showToast(data.error || '添加失败', 'error');
    }
  });

  // ==================== Articles ====================
  async function loadArticles() {
    articlesList.innerHTML = '<div class="skeleton w80 h20"></div><div class="skeleton w60 h20"></div><div class="skeleton w80 h20"></div>';
    var res = await apiFetch('/api/articles');
    if (!res) { articlesList.innerHTML = '<div class="empty-state">加载失败</div>'; return; }
    articles = await res.json();
    renderArticles();
  }

  function renderArticles() {
    var filtered = articles;
    if (activeFeedId) {
      var feed = feeds.find(function (f) { return f.id === activeFeedId; });
      if (feed) {
        filtered = articles.filter(function (a) {
          return a.feedTitle === feed.title || a.feedTitle === feed.url;
        });
      }
    }
    articlesCount.textContent = filtered.length + ' 篇文章';
    if (filtered.length === 0) {
      articlesList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📄</div>暂无文章<br><small>点击"触发抓取"获取内容</small></div>';
      return;
    }
    articlesList.innerHTML = '';
    filtered.forEach(function (article) {
      var card = document.createElement('div');
      card.className = 'article-card';
      card.innerHTML =
        '<div class="article-title"><a href="' + escapeAttr(article.link) + '" target="_blank" rel="noopener">' + escapeHtml(article.title) + '</a></div>' +
        '<div class="article-meta">' +
          '<span class="feed-tag">' + escapeHtml(article.feedTitle || '未知') + '</span>' +
          '<span>' + formatDate(article.pubDate) + '</span>' +
        '</div>';
      articlesList.appendChild(card);
    });
  }

  refreshBtn.addEventListener('click', function () { loadArticles(); });

  triggerCheckBtn.addEventListener('click', async function () {
    triggerCheckBtn.disabled = true;
    triggerCheckBtn.textContent = '抓取中…';
    var res = await apiFetch('/api/check', { method: 'POST' });
    triggerCheckBtn.disabled = false;
    triggerCheckBtn.textContent = '触发抓取';
    if (!res) return;
    if (res.ok) {
      showToast('抓取已触发', 'success');
      setTimeout(loadArticles, 2000);
    } else {
      var data = await res.json();
      showToast(data.error || '抓取失败', 'error');
    }
  });

  clearFilterBtn.addEventListener('click', function () {
    activeFeedId = null;
    clearFilterBtn.style.display = 'none';
    renderFeeds();
    renderArticles();
  });

  // ==================== Settings ====================
  settingsToggle.addEventListener('click', function () {
    settingsToggle.classList.toggle('open');
    settingsBody.classList.toggle('open');
  });

  timeRangeSlider.addEventListener('input', function () {
    timeRangeValue.textContent = timeRangeSlider.value + ' 小时';
  });

  saveSettingsBtn.addEventListener('click', async function () {
    var val = Number(timeRangeSlider.value);
    saveSettingsBtn.disabled = true;
    var res = await apiFetch('/api/settings', {
      method: 'PUT',
      body: JSON.stringify({ timeRangeHours: val })
    });
    saveSettingsBtn.disabled = false;
    if (!res) return;
    if (res.ok) {
      showToast('设置已保存', 'success');
    } else {
      var data = await res.json();
      showToast(data.error || '保存失败', 'error');
    }
  });

  async function loadSettings() {
    var res = await apiFetch('/api/settings');
    if (!res) return;
    if (res.ok) {
      var s = await res.json();
      timeRangeSlider.value = s.timeRangeHours || 24;
      timeRangeValue.textContent = (s.timeRangeHours || 24) + ' 小时';
    }
  }

  // ==================== SSE ====================
  function connectSSE() {
    if (eventSource) { eventSource.close(); }
    try {
      eventSource = new EventSource('/ws');
      eventSource.onopen = function () {
        sseDot.className = 'status-dot connected';
        sseLabel.textContent = '已连接';
      };
      eventSource.onmessage = function (e) {
        if (e.data.startsWith(':')) return;
        try { var data = JSON.parse(e.data); if (data.type === 'new-articles') loadArticles(); } catch {}
      };
      eventSource.onerror = function () {
        sseDot.className = 'status-dot';
        sseLabel.textContent = '未连接';
        eventSource.close();
        eventSource = null;
      };
    } catch (e) {}
  }

  // ==================== Health ====================
  async function checkHealth() {
    try {
      var res = await fetch('/api/health');
      if (res.ok) {
        var data = await res.json();
        healthBar.innerHTML = '<span><span class="dot ok"></span>服务正常</span><span>存储: ' + data.storage + '</span><span>范围: ' + (data.settings?.timeRangeHours || 24) + 'h</span>';
      } else {
        healthBar.innerHTML = '<span><span class="dot err"></span>服务异常</span>';
      }
    } catch (e) {
      healthBar.innerHTML = '<span><span class="dot err"></span>服务不可达</span>';
    }
  }
  checkHealth();
  setInterval(checkHealth, 30000);

  // ==================== Init ====================
  checkLogin();
});
</script>
</body>
</html>
